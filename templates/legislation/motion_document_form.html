{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <div>
        <h1>{{ form_title }}</h1>
        <p>Upload supporting files for this motion.</p>
    </div>

    <a href="{% url 'motion_detail' motion.id %}" class="btn-white">Back</a>
</div>

<div class="form-card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}

                    {% for error in field.errors %}
                        <div class="field-error">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn-green-lg">Upload Document</button>
    </form>
</div>

{% endblock %}
