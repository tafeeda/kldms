{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Password - KLDMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:#f3f4f6; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .reset-card { background:white; width:100%; max-width:500px; padding:35px; border-radius:24px; box-shadow:0 15px 40px rgba(0,0,0,.08); }
        .reset-logo { width:60px; height:60px; background:#0B6B3A; color:white; border-radius:18px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:24px; margin-bottom:18px; }
        h1 { margin:0; color:#0B6B3A; }
        p { color:#6B7280; line-height:1.6; }
        label { font-weight:800; display:block; margin:12px 0 8px; }
        input { width:100%; padding:13px 15px; border-radius:14px; border:1px solid #d1d5db; outline:none; }
        input:focus { border-color:#0B6B3A; box-shadow:0 0 0 4px rgba(11,107,58,.12); }
        ul { color:#6B7280; font-size:13px; }
        button, .btn-green { display:inline-block; width:100%; background:#0B6B3A; color:white; border:none; padding:14px; border-radius:14px; font-weight:900; cursor:pointer; text-align:center; text-decoration:none; margin-top:18px; box-sizing:border-box; }
        .errorlist { color:#991B1B; background:#FEE2E2; padding:12px 16px; border-radius:12px; list-style:none; }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="reset-logo">K</div>

    <h1>Create New Password</h1>

    {% if validlink %}
        <p>Enter your new password twice.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Reset Password</button>
        </form>
    {% else %}
        <p>This password reset link is invalid or has expired.</p>
        <a href="{% url 'password_reset' %}" class="btn-green">Request New Link</a>
    {% endif %}
</div>

</body>
</html>
