{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - KLDMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .reset-card {
            background: white;
            width: 100%;
            max-width: 460px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        .reset-logo {
            width: 60px;
            height: 60px;
            background: #0B6B3A;
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            color: #0B6B3A;
        }

        p {
            color: #6B7280;
            line-height: 1.6;
        }

        label {
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            outline: none;
            margin-bottom: 18px;
        }

        input:focus {
            border-color: #0B6B3A;
            box-shadow: 0 0 0 4px rgba(11,107,58,0.12);
        }

        button {
            width: 100%;
            background: #0B6B3A;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #0B6B3A;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="reset-logo">K</div>

    <h1>Reset Password</h1>
    <p>Enter your account email address. If it exists in the system, a secure reset link will be sent.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}

        <button type="submit">Send Reset Link</button>
    </form>

    <a href="{% url 'login' %}" class="back-link">Back to Login</a>
</div>

</body>
</html>
