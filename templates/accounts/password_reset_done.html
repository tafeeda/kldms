{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email - KLDMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .reset-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .reset-logo {
            width: 60px;
            height: 60px;
            background: #0B6B3A;
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            margin: 0 auto 18px;
        }

        h1 {
            margin: 0;
            color: #0B6B3A;
        }

        p {
            color: #6B7280;
            line-height: 1.6;
        }

        .btn-green {
            display: inline-block;
            background: #0B6B3A;
            color: white;
            padding: 13px 18px;
            border-radius: 14px;
            font-weight: 900;
            text-decoration: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="reset-logo">K</div>

    <h1>Check Your Email</h1>
    <p>
        If the email address exists in the system, a secure password reset link has been sent.
    </p>
    <p>
        During development, check your terminal/command prompt for the reset link.
    </p>

    <a href="{% url 'login' %}" class="btn-green">Back to Login</a>
</div>

</body>
</html>
