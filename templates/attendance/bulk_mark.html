{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Bulk Mark Attendance</h1>
        <p>{{ session.title }} — {{ session.attendance_date|date:"d M Y" }}</p>
    </div>

    <a href="{% url 'attendance_session_detail' session.id %}" class="btn-white">Back</a>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid single">
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}

                    {% for error in field.errors %}
                        <div class="field-error">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn-green-lg">Save Bulk Attendance</button>
    </form>
</div>

{% endblock %}
